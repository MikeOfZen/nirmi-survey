<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nirmi QR Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #2c3e50;
      --muted: #6b7a7a;
      --line: #ede3de;
      --bg: #fff9f0;
      --card: #ffffff;
      --brand: #ff8369;
      --radius: 16px;
      --shadow: 0 12px 28px rgba(44, 62, 80, 0.07);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Nunito", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    /* ── Password gate ── */
    .gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    .gate h1 { margin-bottom: 6px; }
    .gate .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 18px; }
    .gate input {
      width: 260px;
      text-align: center;
      font-size: 1.1rem;
      padding: 12px;
      border: 2px solid var(--line);
      border-radius: 12px;
    }
    .gate input:focus { border-color: var(--brand); outline: none; }
    .gate .gate-error { color: #d9534f; font-size: 0.85rem; margin-top: 8px; min-height: 1.2em; }
    .gate .btn { margin-top: 12px; font-size: 1rem; padding: 12px 28px; }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 14px 30px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    h1, h2 { margin: 0 0 10px; }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .brand img {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 6px;
      background: #fffbf7;
    }

    .muted {
      color: var(--muted);
      margin: 0 0 10px;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .field {
      margin-bottom: 10px;
    }

    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.84rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #ccd8d4;
      border-radius: 10px;
      padding: 9px 10px;
      background: #fff;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: var(--brand);
    }

    .btn.secondary {
      background: #fff0e8;
      color: #e06a52;
      border: 1px solid #ffd4c0;
    }

    .qr-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
    }

    #qrContainer canvas {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: #fff;
    }

    .small {
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0;
    }

    .expiry-badge {
      display: inline-block;
      background: #fff0e8;
      color: #e06a52;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 8px;
    }

    #linkBox textarea {
      font-family: monospace;
      font-size: 0.78rem;
      color: var(--muted);
      width: 100%;
    }

    @media (max-width: 600px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Password gate -->
  <div class="gate" id="gate">
    <img src="./assets/logo.svg" alt="Nirmi" style="width:64px;height:64px;border-radius:14px;margin-bottom:12px;">
    <h1>Nirmi QR Builder</h1>
    <p class="sub">Enter the field password to continue</p>
    <input id="gatePw" type="password" placeholder="Password" autocomplete="off">
    <p class="gate-error" id="gateError"></p>
    <button class="btn" id="gateBtn" type="button">Unlock</button>
  </div>

  <!-- Main app (hidden until auth) -->
  <main id="app" style="display:none;">
    <div class="wrap">

      <!-- QR output — always on top -->
      <section class="card qr-card">
        <div id="qrContainer"></div>
        <p class="small">Print or show this QR. Vendor opens the survey with session context pre-filled.</p>
        <span class="expiry-badge" id="expiryBadge"></span>
        <div class="btns" style="justify-content:center;">
          <button id="downloadQrBtn" class="btn" type="button">Download QR</button>
          <button id="toggleLinkBtn" class="btn secondary" type="button">Show link ▾</button>
        </div>
        <div id="linkBox" style="display:none; width:100%;">
          <textarea id="finalUrl" readonly></textarea>
        </div>
      </section>

      <!-- Session setup form -->
      <section class="card">
        <div class="brand">
          <img src="./assets/logo.svg" alt="Nirmi logo">
          <h1>Nirmi QR Builder</h1>
        </div>
        <p class="muted">Create one QR per field session. Setup is embedded into the QR link — vendors see only a clean survey form on their phone.</p>

        <div class="row">
          <div class="field">
            <label for="sid">Session ID</label>
            <input id="sid" placeholder="e.g. FIELD-2026-04-16">
          </div>
          <div class="field">
            <label for="area">Area</label>
            <input id="area" value="Satungal">
          </div>
          <div class="field">
            <label for="interviewer">Interviewer</label>
            <input id="interviewer" value="Mike">
          </div>
          <div class="field">
            <label for="lang">Language hint</label>
            <select id="lang">
              <option value="ne" selected>नेपाली (Nepali)</option>
              <option value="hi">हिन्दी (Hindi)</option>
              <option value="en">English</option>
            </select>
          </div>
          <div class="field">
            <label for="expiry">Link expires after</label>
            <select id="expiry">
              <option value="3600000">1 hour</option>
              <option value="43200000" selected>12 hours</option>
              <option value="86400000">24 hours</option>
              <option value="2592000000">30 days</option>
            </select>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
  <script>
    "use strict";

    /*
     * Shared HMAC key — same value must appear in index.html.
     * This isn't server-grade security; it prevents casual URL tampering.
     * The real gate is the password on this builder page.
     */
    const HMAC_KEY = "nirmi-field-2026-hmac-key";

    /*
     * Password hash: SHA-256 of the correct password.
     * To change the password, run in browser console:
     *   crypto.subtle.digest("SHA-256", new TextEncoder().encode("YOUR_NEW_PASSWORD"))
     *     .then(b => console.log(Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,"0")).join("")))
     * Then paste the hex string below.
     *
     * Current password: "nirmi2026"
     */
    const PW_HASH = "0a7bbb2dc12133662e8bc8432556ead218acfd3dc5e89164535db9fe80544a5f";

    const SAVE_KEY = "nirmi_qr_builder_state_v2";
    const AUTH_KEY = "nirmi_qr_builder_auth";

    function byId(id) { return document.getElementById(id); }

    /* ── Crypto helpers ── */
    async function sha256hex(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2, "0")).join("");
    }

    async function hmacSign(key, message) {
      const enc = new TextEncoder();
      const cryptoKey = await crypto.subtle.importKey(
        "raw", enc.encode(key), { name: "HMAC", hash: "SHA-256" }, false, ["sign"]
      );
      const sig = await crypto.subtle.sign("HMAC", cryptoKey, enc.encode(message));
      return Array.from(new Uint8Array(sig)).map(x => x.toString(16).padStart(2, "0")).join("");
    }

    /* ── Password gate ── */
    async function checkPassword() {
      const pw = byId("gatePw").value;
      if (!pw) { byId("gateError").textContent = "Enter the password"; return; }
      const hash = await sha256hex(pw);
      if (hash !== PW_HASH) {
        byId("gateError").textContent = "Wrong password";
        byId("gatePw").value = "";
        byId("gatePw").focus();
        return;
      }
      sessionStorage.setItem(AUTH_KEY, "1");
      showApp();
    }

    function showApp() {
      byId("gate").style.display = "none";
      byId("app").style.display = "";
      loadState();
      initQr();
      buildLink();
    }

    /* Auto-unlock if already authenticated this session */
    if (sessionStorage.getItem(AUTH_KEY) === "1") {
      /* defer to after DOM ready */
      document.addEventListener("DOMContentLoaded", showApp);
    }

    byId("gateBtn").addEventListener("click", checkPassword);
    byId("gatePw").addEventListener("keydown", (e) => { if (e.key === "Enter") checkPassword(); });

    /* ── Encoding ── */
    function encodeCfg(cfg) {
      const json = JSON.stringify(cfg);
      const b64 = btoa(unescape(encodeURIComponent(json)));
      return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function inferBaseUrl() {
      const here = new URL(window.location.href);
      const path = here.pathname.replace(/qr-builder\.html$/, "");
      return `${here.origin}${path}`;
    }

    function todaySessionId() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `FIELD-${yyyy}-${mm}-${dd}`;
    }

    function loadState() {
      byId("sid").value = todaySessionId();
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;
      try {
        const s = JSON.parse(raw);
        byId("sid").value = s.sid || todaySessionId();
        byId("area").value = s.area || byId("area").value;
        byId("interviewer").value = s.interviewer || byId("interviewer").value;
        byId("lang").value = s.lang || "ne";
        if (s.expiry) byId("expiry").value = s.expiry;
      } catch (error) {
        /* ignore corrupt state */
      }
    }

    function saveState() {
      const s = {
        sid: byId("sid").value.trim(),
        area: byId("area").value.trim(),
        interviewer: byId("interviewer").value.trim(),
        lang: byId("lang").value,
        expiry: byId("expiry").value
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(s));
    }

    function formatExpiry(ms) {
      const h = ms / 3600000;
      if (h < 24) return `${h} hour${h > 1 ? "s" : ""}`;
      const d = h / 24;
      return `${d} day${d > 1 ? "s" : ""}`;
    }

    let qrCode = null;
    let debounceTimer = null;

    function initQr() {
      qrCode = new QRCodeStyling({
        width: 260,
        height: 260,
        type: "canvas",
        data: "https://nirmi.app",
        image: "./assets/logo.svg",
        dotsOptions: {
          color: "#1a1a1a",
          type: "classy"
        },
        cornersSquareOptions: {
          color: "#ff8369",
          type: "extra-rounded"
        },
        cornersDotOptions: {
          color: "#c95b43",
          type: "dot"
        },
        backgroundOptions: {
          color: "#ffffff"
        },
        imageOptions: {
          crossOrigin: "anonymous",
          margin: 6,
          imageSize: 0.28
        }
      });
      qrCode.append(byId("qrContainer"));
    }

    function scheduleRebuild() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(buildLink, 350);
    }

    async function buildLink() {
      saveState();

      const sid = byId("sid").value.trim() || "session-not-set";
      const expiryMs = parseInt(byId("expiry").value, 10);
      const exp = Date.now() + expiryMs;
      const sig = await hmacSign(HMAC_KEY, `${sid}|${exp}`);

      const cfg = {
        sid,
        area: byId("area").value.trim() || "not-set",
        iv: byId("interviewer").value.trim() || "not-set",
        lang: byId("lang").value,
        exp,
        sig
      };

      const encoded = encodeCfg(cfg);
      const base = inferBaseUrl();
      const target = new URL("index.html", base).toString();
      const final = `${target}?cfg=${encoded}`;

      byId("finalUrl").value = final;
      if (qrCode) qrCode.update({ data: final });

      /* Update expiry badge */
      const expiresAt = new Date(exp);
      byId("expiryBadge").textContent = `Expires: ${expiresAt.toLocaleString()} (${formatExpiry(expiryMs)})`;
    }

    /* Auto-rebuild on any field change */
    ["sid", "area", "interviewer"].forEach(id => {
      byId(id).addEventListener("input", scheduleRebuild);
    });
    ["lang", "expiry"].forEach(id => {
      byId(id).addEventListener("change", scheduleRebuild);
    });

    byId("toggleLinkBtn").addEventListener("click", () => {
      const box = byId("linkBox");
      const btn = byId("toggleLinkBtn");
      const hidden = box.style.display === "none";
      box.style.display = hidden ? "block" : "none";
      btn.textContent = hidden ? "Hide link ▴" : "Show link ▾";
    });

    byId("downloadQrBtn").addEventListener("click", () => {
      const sid = byId("sid").value.trim() || "session";
      qrCode.download({ name: `nirmi-qr-${sid}`, extension: "png" });
    });
  </script>
</body>
</html>
