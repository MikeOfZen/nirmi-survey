<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nirmi — Vendor Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/survey-core@1.12.23/defaultV2.min.css" type="text/css" rel="stylesheet">
  <style>
    :root {
      --ink: #2c3e50;
      --muted: #6b7a7a;
      --line: #ede3de;
      --bg: #fff9f0;
      --card: #ffffff;
      --brand: #ff8369;
      --brand-dark: #e06a52;
      --accent: #ffcc00;
      --warn: #b45309;
      --good: #166534;
      --radius: 16px;
      --shadow: 0 12px 30px rgba(44, 62, 80, 0.07);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Nunito", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 15% 0%, #fff0e8 0, var(--bg) 35%);
      min-height: 100vh;
    }

    .wrap { max-width: 720px; margin: 0 auto; padding: 12px 14px 26px; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      transition: box-shadow 0.3s ease;
    }

    .card:hover { box-shadow: 0 16px 40px rgba(44, 62, 80, 0.1); }

    /* ── Language bar ── */

    .lang-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .lang-bar label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .lang-bar select {
      font-family: inherit;
      font-size: 0.84rem;
      font-weight: 600;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      color: var(--ink);
      cursor: pointer;
    }

    /* ── Brand header ── */

    .brand {
      display: grid;
      gap: 10px;
      align-items: center;
      justify-items: center;
      text-align: center;
      margin-bottom: 12px;
    }

    .brand-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--line);
      padding: 10px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.15rem, 4vw, 1.55rem);
      font-weight: 800;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .brand p { margin: 0; color: var(--muted); font-size: 0.94rem; line-height: 1.45; }

    .intro-badge {
      font-size: 0.86rem;
      line-height: 1.5;
      color: var(--brand-dark);
      background: #fff0e8;
      border: 1px solid #ffd4c0;
      border-radius: 10px;
      padding: 10px 12px;
      text-align: left;
    }

    .meta-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
    }

    .meta-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fffbf7;
      padding: 8px;
      text-align: left;
    }

    .meta-item .k { font-size: 0.73rem; color: var(--muted); margin-bottom: 2px; }
    .meta-item .v { font-size: 0.88rem; font-weight: 700; word-break: break-word; }

    .banner {
      margin-top: 10px;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.86rem;
      line-height: 1.45;
      width: 100%;
    }

    .banner.warn { background: #fff7ed; border: 1px solid #fed7aa; color: var(--warn); }
    .banner.good { background: #ecfdf3; border: 1px solid #bbf7d0; color: var(--good); }

    /* ── Survey card ── */

    #surveyCard { margin-top: 12px; overflow: hidden; }
    #surveyContainer { min-height: 340px; }

    /* ── Result card ── */

    .result { margin-top: 12px; display: none; gap: 10px; }
    .result.show { display: grid; animation: popIn 0.4s ease-out; }

    .code-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff5ee;
      color: var(--brand-dark);
      font-weight: 700;
      font-size: 0.82rem;
      width: fit-content;
    }

    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }

    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:active { transform: scale(0.97); }

    .btn.primary {
      background: var(--brand);
      border-color: transparent;
      color: #fff;
    }

    .btn.primary:hover { box-shadow: 0 4px 14px rgba(255, 131, 105, 0.35); }

    .mini { font-size: 0.84rem; color: var(--muted); margin: 0; }

    .hidden { display: none !important; }

    /* ── Progress ring ── */

    .progress-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      background: linear-gradient(135deg, #fff0e8 0%, #fffbf0 100%);
      border: 1px solid var(--line);
      width: 100%;
    }

    .progress-ring { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
    .progress-ring svg { transform: rotate(-90deg); width: 42px; height: 42px; }
    .progress-ring .track { fill: none; stroke: var(--line); stroke-width: 4; }

    .progress-ring .fill {
      fill: none;
      stroke: var(--brand);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 113;
      stroke-dashoffset: 113;
      transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-pct {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--brand);
    }

    .progress-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .progress-text .countdown { font-size: 0.88rem; font-weight: 700; color: var(--ink); }

    .progress-text .encourage {
      font-size: 0.82rem;
      color: var(--brand);
      font-weight: 600;
      animation: fadeSlideIn 0.4s ease-out;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      0% { transform: scale(0.85); opacity: 0; }
      60% { transform: scale(1.04); }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 620px) {
      .meta-row { grid-template-columns: 1fr; }
      .card { padding: 14px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="lang-bar">
      <label for="langSelect" id="langLabel">Language</label>
      <select id="langSelect">
        <option value="ne">नेपाली</option>
        <option value="hi">हिन्दी</option>
        <option value="en">English</option>
      </select>
    </div>

    <section class="card brand">
      <img class="brand-logo" src="./assets/logo.svg" alt="Nirmi logo">
      <h1 id="pageTitle">Nirmi — Vendor Research</h1>
      <p id="pageSubtitle">Please answer this short form. It takes about 5–6 minutes.</p>
      <p id="introText" class="intro-badge">This is market research for the Nirmi app. Your answers help us build the app around your real needs.</p>
      <div class="meta-row">
        <div class="meta-item">
          <div class="k" id="labelSession">Session</div>
          <div class="v" id="metaSession">-</div>
        </div>
        <div class="meta-item">
          <div class="k" id="labelArea">Area</div>
          <div class="v" id="metaArea">-</div>
        </div>
        <div class="meta-item">
          <div class="k" id="labelInterviewer">Interviewer</div>
          <div class="v" id="metaInterviewer">-</div>
        </div>
      </div>
      <div id="storageNotice" class="banner warn hidden"></div>
      <div id="progressStrip" class="progress-strip hidden">
        <div class="progress-ring">
          <svg viewBox="0 0 40 40"><circle class="track" cx="20" cy="20" r="18"/><circle id="progressFill" class="fill" cx="20" cy="20" r="18"/></svg>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-text">
          <span class="countdown" id="countdownText"></span>
          <span class="encourage" id="encourageText"></span>
        </div>
      </div>
    </section>

    <section id="surveyCard" class="card">
      <div id="surveyContainer"></div>
    </section>

    <section id="resultCard" class="card result" aria-live="polite">
      <h2 id="thankYouTitle" style="margin: 0; font-size: 1.1rem;">Thank you!</h2>
      <p id="resultMessage" class="mini"></p>
      <span id="submissionCode" class="code-pill"></span>
      <div class="actions">
        <button type="button" id="retryBtn" class="btn hidden">Retry</button>
        <button type="button" id="copyPayloadBtn" class="btn">Copy backup</button>
        <button type="button" id="startOverBtn" class="btn primary">New response</button>
      </div>
      <p id="backupNote" class="mini">If upload fails, this page keeps a local backup until it syncs.</p>
    </section>
  </main>

          pilot_interest: [{value:"Yes",text:"हाँ"},{value:"Maybe",text:"शायद"},{value:"No",text:"नहीं"}],
          promo_push_interest: [{value:"Yes definitely",text:"बिल्कुल"},{value:"Maybe if affordable",text:"सस्ता हो तो शायद"},{value:"No",text:"नहीं"}],
          promo_push_budget: [{value:"NPR 100-200",text:"₹100–200"},{value:"NPR 200-500",text:"₹200–500"},{value:"NPR 500-1000",text:"₹500–1000"},{value:"NPR 1000+",text:"₹1000+"}]
        }
      }
    };

    /* ══════════════════════════════════════════════════════
       Functions
       ══════════════════════════════════════════════════════ */

    function byId(id) { return document.getElementById(id); }

    function detectLang(paramLang) {
      if (paramLang && paramLang !== "auto") {
        const code = paramLang.split("-")[0].toLowerCase();
        if (code === "ne" || code === "np") return "ne";
        if (code === "hi") return "hi";
        if (code === "en") return "en";
        return code;
      }
      const langs = navigator.languages || [navigator.language || "en"];
      for (const l of langs) {
        const code = l.split("-")[0].toLowerCase();
        if (code === "ne" || code === "np") return "ne";
        if (code === "hi") return "hi";
      }
      return "ne";
    }

    function localizeSurvey(json, lang) {
      if (lang === "en" || !SURVEY_I18N[lang]) return json;
      const t = SURVEY_I18N[lang];
      const patched = JSON.parse(JSON.stringify(json));
      if (t.submit) patched.completeText = t.submit;
      for (const page of patched.pages) {
        if (t.pages[page.name]) page.title = t.pages[page.name];
        for (const el of page.elements || []) {
          if (t.questions[el.name]) el.title = t.questions[el.name];
          if (t.descriptions && t.descriptions[el.name]) el.description = t.descriptions[el.name];
          if (t.choices[el.name]) el.choices = t.choices[el.name];
        }
      }
      return patched;
    }

    function applyChrome(lang) {
      const s = STRINGS[lang] || STRINGS.en;
      document.documentElement.lang = lang;
      byId("pageTitle").textContent = s.pageTitle;
      byId("pageSubtitle").textContent = s.pageSubtitle;
      byId("introText").textContent = s.introText;
      byId("langLabel").textContent = s.langLabel;
      byId("labelSession").textContent = s.labelSession;
      byId("labelArea").textContent = s.labelArea;
      byId("labelInterviewer").textContent = s.labelInterviewer;
      byId("thankYouTitle").textContent = s.thankYou;
      byId("retryBtn").textContent = s.retryBtn;
      byId("copyPayloadBtn").textContent = s.copyBtn;
      byId("startOverBtn").textContent = s.newBtn;
      byId("backupNote").textContent = s.backupNote;
      byId("langSelect").value = lang;
    }

    function updateProgress(survey, s) {
      const total = survey.visiblePageCount;
      const current = survey.currentPageNo;
      const remaining = total - current;
      const pct = Math.round((current / total) * 100);
      const strip = byId("progressStrip");
      strip.classList.remove("hidden");
      const circumference = 2 * Math.PI * 18;
      byId("progressFill").style.strokeDashoffset = circumference - (circumference * pct / 100);
      byId("progressPct").textContent = pct + "%";
      byId("countdownText").textContent = s.countdown(remaining);
      const idx = Math.min(current, s.encourage.length - 1);
      const el = byId("encourageText");
      el.textContent = s.encourage[idx];
      el.style.animation = "none";
      el.offsetHeight;
      el.style.animation = "";
    }

    function parseConfig() {
      const params = new URLSearchParams(window.location.search);
      const fallback = {
        sid: params.get("sid") || "session-not-set",
        area: params.get("area") || "not-set",
        interviewer: params.get("iv") || "not-set",
        endpoint: params.get("ep") || "",
        lang: params.get("lang") || "auto"
      };
      const cfg = params.get("cfg");
      if (!cfg) return fallback;
      try {
        const b64 = cfg.replace(/-/g, "+").replace(/_/g, "/");
        const json = decodeURIComponent(escape(window.atob(b64)));
        const parsed = JSON.parse(json);
        return {
          sid: parsed.sid || fallback.sid,
          area: parsed.area || fallback.area,
          interviewer: parsed.iv || fallback.interviewer,
          endpoint: parsed.ep || fallback.endpoint,
          lang: parsed.lang || fallback.lang
        };
      } catch (error) {
        console.error("Invalid cfg in URL", error);
        return fallback;
      }
    }

    function asNumber(value, fallback) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function midpointFromBand(type, value) {
      return (BAND_MIDPOINTS[type] || {})[value] || 0;
    }

    function computeEconomics(data) {
      const customers = asNumber(data.customers_exact, midpointFromBand("customers_band", data.customers_band));
      const revenue = asNumber(data.revenue_exact, midpointFromBand("revenue_band", data.revenue_band));
      const cost = asNumber(data.cost_exact, midpointFromBand("cost_band", data.cost_band));
      const net = revenue - cost;
      const marginPct = revenue > 0 ? Math.round((net / revenue) * 100) : 0;
      return { customers, revenue, cost, net, marginPct };
    }

    function queuePayload(payload) {
      const queue = JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]");
      queue.push(payload);
      localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
      localStorage.setItem(LAST_PAYLOAD_KEY, JSON.stringify(payload));
    }

    async function submitPayload(payload, endpoint) {
      if (!endpoint) {
        queuePayload(payload);
        return { ok: false, queued: true, reason: "no-endpoint" };
      }
      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          queuePayload(payload);
          return { ok: false, queued: true, reason: `http-${response.status}` };
        }
        localStorage.setItem(LAST_PAYLOAD_KEY, JSON.stringify(payload));
        return { ok: true, queued: false };
      } catch (error) {
        queuePayload(payload);
        return { ok: false, queued: true, reason: "network" };
      }
    }

    async function flushQueue(endpoint) {
      if (!endpoint) return { flushed: 0, pending: JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]").length };
      const queue = JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]");
      if (!queue.length) return { flushed: 0, pending: 0 };
      const stillPending = [];
      let flushed = 0;
      for (const payload of queue) {
        try {
          const response = await fetch(endpoint, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          if (response.ok) { flushed += 1; } else { stillPending.push(payload); }
        } catch (error) { stillPending.push(payload); }
      }
      localStorage.setItem(QUEUE_KEY, JSON.stringify(stillPending));
      return { flushed, pending: stillPending.length };
    }

    function showResult(message, code, queued) {
      byId("resultMessage").textContent = message;
      byId("submissionCode").textContent = `Submission ${code}`;
      byId("retryBtn").classList.toggle("hidden", !queued);
      byId("resultCard").classList.add("show");
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function randomId() {
      if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID().slice(0, 8).toUpperCase();
      return `R${Date.now().toString(36).toUpperCase()}`;
    }

    /* ══════════════════════════════════════════════════════
       Bootstrap
       ══════════════════════════════════════════════════════ */

    async function bootstrap() {
      const config = parseConfig();
      const lang = detectLang(config.lang);
      config.lang = lang;
      const s = STRINGS[lang] || STRINGS.en;

      byId("metaSession").textContent = config.sid;
      byId("metaArea").textContent = config.area;
      byId("metaInterviewer").textContent = config.interviewer;
      applyChrome(lang);

      if (!config.endpoint) {
        const n = byId("storageNotice");
        n.classList.remove("hidden");
        n.textContent = s.noEndpoint;
      }

      const queueStats = await flushQueue(config.endpoint);
      if (queueStats.flushed > 0) {
        const n = byId("storageNotice");
        n.classList.remove("hidden");
        n.classList.remove("warn");
        n.classList.add("good");
        n.textContent = s.syncedMsg(queueStats.flushed);
      }

      /* Language override */
      byId("langSelect").addEventListener("change", () => {
        const newLang = byId("langSelect").value;
        const url = new URL(window.location.href);
        const cfgParam = url.searchParams.get("cfg");
        if (cfgParam) {
          try {
            const b64 = cfgParam.replace(/-/g, "+").replace(/_/g, "/");
            const json = decodeURIComponent(escape(window.atob(b64)));
            const parsed = JSON.parse(json);
            parsed.lang = newLang;
            const newJson = JSON.stringify(parsed);
            const newB64 = btoa(unescape(encodeURIComponent(newJson)));
            url.searchParams.set("cfg", newB64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, ""));
          } catch (e) {
            url.searchParams.set("lang", newLang);
          }
        } else {
          url.searchParams.set("lang", newLang);
        }
        window.location.href = url.toString();
      });

      /* Render survey */
      const surveyJson = localizeSurvey(SURVEY_JSON, lang);
      const survey = new Survey.Model(surveyJson);
      survey.showCompletedPage = false;
      survey.render(byId("surveyContainer"));

      updateProgress(survey, s);
      survey.onCurrentPageChanged.add(() => updateProgress(survey, s));

      survey.onComplete.add((sender) => {
        byId("progressStrip").classList.add("hidden");
        byId("surveyCard").classList.add("hidden");
        const submissionId = randomId();
        const economics = computeEconomics(sender.data);
        const payload = {
          submissionId,
          surveyVersion: "2.0",
          submittedAt: new Date().toISOString(),
          context: {
            sessionId: config.sid,
            area: config.area,
            interviewer: config.interviewer,
            lang: config.lang,
            userAgent: navigator.userAgent,
            pageUrl: window.location.href
          },
          answers: sender.data,
          computed: {
            customersPerShift: economics.customers,
            revenuePerShiftNpr: economics.revenue,
            costPerShiftNpr: economics.cost,
            netPerShiftNpr: economics.net,
            marginPct: economics.marginPct
          }
        };

        showResult(s.resultQueued, submissionId, true);

        submitPayload(payload, config.endpoint).then((result) => {
          if (result.ok) {
            byId("resultMessage").textContent = s.resultOk;
            byId("retryBtn").classList.add("hidden");
          }
        });
      });

      byId("retryBtn").addEventListener("click", async () => {
        const stats = await flushQueue(config.endpoint);
        if (stats.pending === 0) {
          byId("retryBtn").classList.add("hidden");
          byId("resultMessage").textContent = s.queueSynced;
          return;
        }
        byId("resultMessage").textContent = s.pendingMsg(stats.pending);
      });

      byId("copyPayloadBtn").addEventListener("click", async () => {
        const raw = localStorage.getItem(LAST_PAYLOAD_KEY);
        if (!raw) { byId("resultMessage").textContent = s.noBackupMsg; return; }
        try {
          await navigator.clipboard.writeText(raw);
          byId("resultMessage").textContent = s.copiedMsg;
        } catch (error) { byId("resultMessage").textContent = s.noCopyMsg; }
      });

      byId("startOverBtn").addEventListener("click", () => window.location.reload());
    }

    bootstrap();
  </script>
</body>
