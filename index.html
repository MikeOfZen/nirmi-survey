<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Nirmi — Vendor Survey</title>
  <link rel="stylesheet" href="https://unpkg.com/survey-core@1.12.23/defaultV2.min.css">
  <script src="https://unpkg.com/survey-core@1.12.23/survey.core.min.js"></script>
  <script src="https://unpkg.com/survey-js-ui@1.12.23/survey-js-ui.min.js"></script>
  <style>
    :root {
      --brand: #ff8369;
      --brand-dark: #e0674f;
      --accent: #ffcc00;
      --bg: #faf7f5;
      --card: #ffffff;
      --text: #2d2d2d;
      --muted: #888;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding: 0 0 40px; }
    .hidden { display: none !important; }

    /* ── Brand header ── */
    .brand { text-align: center; padding: 28px 16px 12px; }
    .brand-logo { width: 56px; height: 56px; border-radius: 14px; }
    .brand h1 { font-size: 1.35rem; margin: 8px 0 2px; color: var(--brand); }
    .brand .subtitle { font-size: 0.85rem; color: var(--muted); }
    .brand .intro { font-size: 0.92rem; margin: 10px auto 0; max-width: 340px; line-height: 1.5; }
    .meta-row { display: flex; justify-content: center; gap: 16px; margin-top: 10px; font-size: 0.72rem; color: var(--muted); flex-wrap: wrap; }
    .meta-row span { white-space: nowrap; }

    /* ── Language bar ── */
    .lang-bar { display: flex; justify-content: flex-end; align-items: center; padding: 10px 16px 0; gap: 6px; }
    .lang-bar label { font-size: 0.78rem; color: var(--muted); }
    .lang-bar select { font-size: 0.82rem; padding: 3px 6px; border-radius: 6px; border: 1px solid #ddd; background: var(--card); }

    /* ── Progress ── */
    .progress-strip { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 8px 16px; }
    .progress-ring { width: 44px; height: 44px; }
    .progress-ring__bg { fill: none; stroke: #eee; stroke-width: 4; }
    .progress-ring__fill { fill: none; stroke: var(--brand); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; transform: rotate(-90deg); transform-origin: center; }
    .progress-info { text-align: left; }
    .progress-info .pct { font-weight: 700; font-size: 0.95rem; }
    .progress-info .countdown { font-size: 0.78rem; color: var(--muted); }
    .progress-info .encourage { font-size: 0.78rem; color: var(--brand); animation: fadeSlideIn 0.4s ease; }

    /* ── Survey card ── */
    .survey-card { max-width: 520px; margin: 0 auto; padding: 0 12px; }

    /* ── Result card ── */
    .result-card { display: none; max-width: 400px; margin: 24px auto; padding: 28px 20px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); text-align: center; }
    .result-card.show { display: block; animation: popIn 0.35s ease; }
    .result-card h2 { font-size: 1.2rem; margin-bottom: 8px; }
    .result-card .code { font-family: monospace; font-size: 0.85rem; color: var(--brand); margin: 6px 0 12px; }
    .result-card button { display: inline-block; margin: 4px; padding: 10px 18px; border: none; border-radius: 10px; font-size: 0.88rem; cursor: pointer; background: var(--brand); color: #fff; }
    .result-card button:active { transform: scale(0.97); }
    .result-card button.secondary { background: #eee; color: var(--text); }
    .submitting-pulse { animation: pulse 1.2s ease-in-out infinite; }

    /* ── Help bottom sheet ── */
    .help-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .help-overlay.open { opacity: 1; pointer-events: auto; }
    .help-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-radius: 20px 20px 0 0; padding: 20px 20px 32px; max-height: 65vh; overflow-y: auto; z-index: 1000; transform: translateY(100%); transition: transform 0.3s ease; box-shadow: 0 -4px 24px rgba(0,0,0,0.12); }
    .help-sheet.open { transform: translateY(0); }
    .help-sheet .help-handle { width: 40px; height: 4px; border-radius: 2px; background: #ddd; margin: 0 auto 14px; }
    .help-sheet h3 { font-size: 1rem; margin-bottom: 8px; color: var(--brand); }
    .help-sheet p { font-size: 0.88rem; line-height: 1.55; margin-bottom: 6px; }
    .help-sheet ul { font-size: 0.85rem; line-height: 1.55; padding-left: 18px; }
    .help-sheet li { margin-bottom: 4px; }
    .help-btn { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--brand); color: var(--brand); font-size: 0.72rem; font-weight: 700; cursor: pointer; background: transparent; margin-left: 6px; vertical-align: middle; line-height: 1; flex-shrink: 0; }
    .help-btn:active { background: var(--brand); color: #fff; }

    /* ── Celebration ── */
    .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 9998; overflow: hidden; }
    .confetti-piece { position: absolute; top: -30px; font-size: 1.5rem; animation: confettiFall 3s ease-out forwards; }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg) scale(0.5); opacity: 0; }
    }
    .success-toast { position: fixed; top: 18%; left: 50%; transform: translateX(-50%); background: var(--card); border-radius: 20px; padding: 28px 32px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); z-index: 10000; text-align: center; animation: toastIn 0.4s ease; min-width: 240px; }
    .success-toast .toast-close { position: absolute; top: 10px; right: 14px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--muted); }
    .success-toast .toast-emoji { font-size: 2.5rem; margin-bottom: 8px; }
    .success-toast .toast-text { font-size: 1rem; font-weight: 600; }
    .toast-fade { opacity: 0; transition: opacity 0.4s; }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }

    /* ── Char counter ── */
    .char-counter { font-size: 0.72rem; color: var(--muted); text-align: right; margin-top: 2px; }
    .char-counter.near-limit { color: var(--brand); font-weight: 600; }

    /* ── Animations ── */
    @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <!-- Language bar -->
  <div class="lang-bar">
    <label id="langLabel">भाषा:</label>
    <select id="langSelect">
      <option value="ne">नेपाली</option>
      <option value="hi">हिन्दी</option>
      <option value="en">English</option>
    </select>
  </div>

  <!-- Brand header -->
  <div class="brand">
    <img class="brand-logo" src="assets/nirmi-logo.png" alt="Nirmi"
         onerror="this.style.display='none'">
    <h1 id="pageTitle">निर्मी — विक्रेता सर्वेक्षण</h1>
    <p class="subtitle" id="pageSubtitle">तपाईँको व्यापार बुझ्न मद्दत गर्नुहोस्</p>
    <p class="intro" id="introText">तपाईँको जवाफले हामीलाई तपाईँको लागि राम्रो app बनाउन मद्दत गर्छ।</p>
    <div class="meta-row">
      <span><span id="labelSession">Session:</span> <strong id="metaSession">—</strong></span>
      <span><span id="labelArea">Area:</span> <strong id="metaArea">—</strong></span>
      <span><span id="labelInterviewer">Interviewer:</span> <strong id="metaInterviewer">—</strong></span>
    </div>
  </div>

  <!-- Progress strip -->
  <div class="progress-strip hidden" id="progressStrip">
    <svg class="progress-ring" viewBox="0 0 44 44">
      <circle class="progress-ring__bg" cx="22" cy="22" r="18"/>
      <circle class="progress-ring__fill" id="progressFill" cx="22" cy="22" r="18"
              stroke-dasharray="113.1" stroke-dashoffset="113.1"/>
    </svg>
    <div class="progress-info">
      <div class="pct" id="progressPct">0%</div>
      <div class="countdown" id="countdownText"></div>
      <div class="encourage" id="encourageText"></div>
    </div>
  </div>

  <!-- Survey -->
  <div class="survey-card" id="surveyCard">
    <div id="surveyContainer"></div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <h2 id="resultTitle"></h2>
    <p id="resultMessage"></p>
    <p class="code hidden" id="submissionCode"></p>
    <button class="hidden" id="retryBtn">Retry</button>
    <button class="hidden secondary" id="copyPayloadBtn">Copy</button>
    <button class="hidden secondary" id="startOverBtn">New</button>
  </div>

  <!-- Help bottom sheet -->
  <div class="help-overlay" id="helpOverlay"></div>
  <div class="help-sheet" id="helpSheet">
    <div class="help-handle"></div>
    <h3 id="helpTitle"></h3>
    <div id="helpBody"></div>
  </div>

  <script>
    "use strict";

    /* ══════════════════════════════════════════════════════
       Config
       ══════════════════════════════════════════════════════ */
    const INTAKE_URL = "https://nirmi-intake.michael-zl-prime.workers.dev/intake";
    const SURVEY_VERSION = "4.0";
    const BAND_MIDPOINTS = {
      customers_band: { cb_1_10:5, cb_11_20:15, cb_21_40:30, cb_41_70:55, cb_71_100:85, cb_over100:130 },
      revenue_band: { rb_under1k:700, rb_1k_2k:1500, rb_2k_4k:3000, rb_4k_7k:5500, rb_7k_12k:9500, rb_over12k:15000 }
    };

    /* ══════════════════════════════════════════════════════
       Survey JSON — v4.0
       All choice values are stable IDs.
       ══════════════════════════════════════════════════════ */
    const SURVEY_JSON = {
      showQuestionNumbers: "on",
      questionStartIndex: "1",
      clearInvisibleValues: "onHidden",
      focusOnFirstError: true,
      focusFirstQuestionAutomatic: false,
      pages: [
        /* ── Page 1: Business ── */
        {
          name: "business",
          title: "Your Business",
          elements: [
            { type: "text", name: "vendor_name", title: "Your name (optional)", isRequired: false, maxLength: 80 },
            { type: "checkbox", name: "vendor_type", title: "What do you sell?", isRequired: true,
              showNoneItem: true, noneText: "Prefer not to answer",
              choices: [
                { value: "vt_veg", text: "Vegetables" },
                { value: "vt_fruit", text: "Fruits" },
                { value: "vt_snack", text: "Snacks" },
                { value: "vt_dairy", text: "Dairy (milk, curd, etc.)" },
                { value: "vt_grocery", text: "Mixed groceries" },
                { value: "vt_cooked", text: "Cooked food" },
                { value: "vt_other", text: "Other" }
              ]
            },
            { type: "radiogroup", name: "selling_mode", title: "How do you sell?", isRequired: true,
              choices: [
                { value: "sm_mobile", text: "I go around selling (cart / vehicle)" },
                { value: "sm_stationary", text: "I sit in one spot" },
                { value: "sm_permanent", text: "I have a permanent shop" },
                { value: "_skip", text: "Prefer not to answer" }
              ]
            },
            /* Mobile-only */
            { type: "radiogroup", name: "transport_mode", title: "How do you carry your goods?",
              visibleIf: "{selling_mode} = 'sm_mobile'", isRequired: false,
              choices: [
                { value: "tm_cart", text: "Pushcart / hand cart" },
                { value: "tm_moto", text: "Motorcycle" },
                { value: "tm_bicycle", text: "Bicycle" },
                { value: "tm_foot", text: "On foot / head-carry" },
                { value: "tm_auto", text: "Auto-rickshaw / tempo" }
              ]
            },
            { type: "radiogroup", name: "carry_weight_kg", title: "How many kg do you carry per trip?",
              visibleIf: "{selling_mode} = 'sm_mobile'", isRequired: false,
              choices: [
                { value: "cw_under5", text: "Less than 5 kg" },
                { value: "cw_5_10", text: "5–10 kg" },
                { value: "cw_10_20", text: "10–20 kg" },
                { value: "cw_20_30", text: "20–30 kg" },
                { value: "cw_over30", text: "More than 30 kg" }
              ]
            },
            { type: "text", name: "travel_hours", title: "How many hours do you travel per day?",
              visibleIf: "{selling_mode} = 'sm_mobile'", inputType: "number", min: 0, max: 24, isRequired: false },
            { type: "radiogroup", name: "travel_km", title: "How far do you travel in a day?",
              visibleIf: "{selling_mode} = 'sm_mobile'", isRequired: false,
              choices: [
                { value: "tk_under2", text: "Less than 2 km" },
                { value: "tk_2_5", text: "2–5 km" },
                { value: "tk_5_10", text: "5–10 km" },
                { value: "tk_over10", text: "More than 10 km" }
              ]
            },
            { type: "radiogroup", name: "stops_per_day", title: "How many stops do you make per day?",
              visibleIf: "{selling_mode} = 'sm_mobile'", isRequired: false,
              choices: [
                { value: "sd_1_3", text: "1–3" },
                { value: "sd_4_6", text: "4–6" },
                { value: "sd_7_10", text: "7–10" },
                { value: "sd_over10", text: "10+" }
              ]
            },
            /* Stationary-only */
            { type: "text", name: "spot_hours", title: "How many hours do you sit per day?",
              visibleIf: "{selling_mode} = 'sm_stationary'", inputType: "number", min: 0, max: 24, isRequired: false },
            { type: "radiogroup", name: "location_type", title: "Where is your spot?",
              visibleIf: "{selling_mode} = 'sm_stationary'", isRequired: false,
              choices: [
                { value: "lt_sidewalk", text: "Sidewalk / footpath" },
                { value: "lt_market", text: "Market area" },
                { value: "lt_intersection", text: "Intersection / chowk" },
                { value: "lt_temple", text: "Temple / shrine area" },
                { value: "lt_other", text: "Other" }
              ]
            },
            /* Permanent-only */
            { type: "radiogroup", name: "shop_type", title: "What kind of shop?",
              visibleIf: "{selling_mode} = 'sm_permanent'", isRequired: false,
              choices: [
                { value: "st_rented", text: "Rented space" },
                { value: "st_own", text: "Own building" },
                { value: "st_stall", text: "Market stall" },
                { value: "st_other", text: "Other" }
              ]
            },
            /* All */
            { type: "radiogroup", name: "shift_window", title: "When do you sell?", isRequired: true,
              choices: [
                { value: "sw_morning", text: "Morning" },
                { value: "sw_afternoon", text: "Afternoon" },
                { value: "sw_evening", text: "Evening" },
                { value: "sw_allday", text: "All day" },
                { value: "_skip", text: "Prefer not to answer" }
              ]
            }
          ]
        },
        /* ── Page 2: Income ── */
        {
          name: "income",
          title: "Income & Sales",
          elements: [
            { type: "radiogroup", name: "customers_band", title: "How many customers come per day?", isRequired: true,
              choices: [
                { value: "cb_1_10", text: "1–10" },
                { value: "cb_11_20", text: "11–20" },
                { value: "cb_21_40", text: "21–40" },
                { value: "cb_41_70", text: "41–70" },
                { value: "cb_71_100", text: "71–100" },
                { value: "cb_over100", text: "100+" },
                { value: "_skip", text: "Prefer not to answer" }
              ]
            },
            { type: "radiogroup", name: "revenue_band", title: "How many rupees of goods sell in one day?", isRequired: true,
              choices: [
                { value: "rb_under1k", text: "Below NPR 1,000" },
                { value: "rb_1k_2k", text: "NPR 1,000–2,000" },
                { value: "rb_2k_4k", text: "NPR 2,000–4,000" },
                { value: "rb_4k_7k", text: "NPR 4,000–7,000" },
                { value: "rb_7k_12k", text: "NPR 7,000–12,000" },
                { value: "rb_over12k", text: "NPR 12,000+" },
                { value: "_skip", text: "Prefer not to answer" }
              ]
            },
            { type: "radiogroup", name: "business_model", title: "Do you buy goods to sell, or make them yourself?", isRequired: true,
              choices: [
                { value: "bm_buy", text: "I buy and resell" },
                { value: "bm_make", text: "I make / prepare myself" },
                { value: "bm_both", text: "Both" },
                { value: "_skip", text: "Prefer not to answer" }
              ]
            },
            { type: "radiogroup", name: "profit_margin", title: "If you sell for 100 rupees, how much is your profit?", isRequired: true,
              description: "Out of every 100 rupees you receive, how much is left after costs?",
              choices: [
                { value: "pm_under10", text: "Less than 10 rupees" },
                { value: "pm_10_20", text: "10–20 rupees" },
                { value: "pm_20_35", text: "20–35 rupees" },
                { value: "pm_35_50", text: "35–50 rupees" },
                { value: "pm_over50", text: "More than 50 rupees" },
                { value: "_skip", text: "Prefer not to answer" }
              ]
            },
            { type: "text", name: "main_item_cost", title: "Your main product — your buying price (NPR)",
              visibleIf: "{business_model} = 'bm_buy' or {business_model} = 'bm_both'",
              inputType: "number", min: 0, isRequired: false },
            { type: "text", name: "main_item_price", title: "Your main product — your selling price (NPR)",
              visibleIf: "{business_model} = 'bm_buy' or {business_model} = 'bm_both'",
              inputType: "number", min: 0, isRequired: false }
          ]
        },
        /* ── Page 3: Customers ── */
        {
          name: "relationship",
          title: "Customer Relationships",
          elements: [
            { type: "radiogroup", name: "repeat_share", title: "Out of 100 customers, how many come back again?", isRequired: true,
              choices: [
                { value: "rs_under25", text: "Less than 25" },
                { value: "rs_25_50", text: "25–50" },
                { value: "rs_50_75", text: "50–75" },
                { value: "rs_over75", text: "More than 75" },
                { value: "_skip", text: "Prefer not to answer" }
              ]
            },
            { type: "checkbox", name: "discovery_mode", title: "How do customers find you?", isRequired: false,
              choices: [
                { value: "dm_voice", text: "Voice call / shouting" },
                { value: "dm_habit", text: "Fixed time habit" },
                { value: "dm_phone", text: "Phone call / SMS" },
                { value: "dm_neighbor", text: "Neighbors tell each other" },
                { value: "dm_social", text: "Social media" },
                { value: "dm_other", text: "Other" }
              ]
            },
            { type: "radiogroup", name: "offers_credit", title: "Do you give products now and get paid later?", isRequired: true,
              description: "Do customers take goods and pay you another day?",
              choices: [
                { value: "oc_yes", text: "Yes, regularly" },
                { value: "oc_sometimes", text: "Sometimes" },
                { value: "oc_no", text: "No" },
                { value: "_skip", text: "Prefer not to answer" }
              ]
            },
            { type: "radiogroup", name: "credit_customers", title: "How many customers owe you money?",
              visibleIf: "{offers_credit} = 'oc_yes' or {offers_credit} = 'oc_sometimes'", isRequired: false,
              choices: [
                { value: "cc_1_5", text: "1–5" },
                { value: "cc_6_15", text: "6–15" },
                { value: "cc_16_30", text: "16–30" },
                { value: "cc_over30", text: "30+" }
              ]
            },
            { type: "radiogroup", name: "credit_tracking", title: "How do you track who owes you?",
              visibleIf: "{offers_credit} = 'oc_yes' or {offers_credit} = 'oc_sometimes'", isRequired: false,
              choices: [
                { value: "ct_paper", text: "Paper notebook" },
                { value: "ct_memory", text: "Memory only" },
                { value: "ct_phone", text: "Phone notes" },
                { value: "ct_other", text: "Other" }
              ]
            },
            { type: "checkbox", name: "credit_problems", title: "What problems do you face with credit?",
              visibleIf: "{offers_credit} = 'oc_yes' or {offers_credit} = 'oc_sometimes'", isRequired: false,
              choices: [
                { value: "cp_forget", text: "Customers forget to pay" },
                { value: "cp_track", text: "Hard to keep track" },
                { value: "cp_dispute", text: "Leads to arguments" },
                { value: "cp_none", text: "No big problem" }
              ]
            }
          ]
        },
        /* ── Page 4: Features ── */
        {
          name: "features",
          title: "Challenges & Features",
          elements: [
            { type: "checkbox", name: "pain_points", title: "What are the biggest problems in your business? (Pick up to 3)", isRequired: true,
              maxSelectedChoices: 3, showNoneItem: true, noneText: "Prefer not to answer",
              choices: [
                { value: "pp_reach", text: "Not enough customers" },
                { value: "pp_demand", text: "Don't know what will sell" },
                { value: "pp_repeat", text: "Can't track repeat customers" },
                { value: "pp_spoilage", text: "Goods spoil / go to waste" },
                { value: "pp_payment", text: "Hard to collect payments" },
                { value: "pp_billing", text: "No easy way to make bills" },
                { value: "pp_credit", text: "Credit / debt tracking is hard" },
                { value: "pp_weather", text: "Bad weather hurts sales" }
              ]
            },
            { type: "checkbox", name: "top_features", title: "Which app features would help you most? (Pick up to 3)", isRequired: true,
              maxSelectedChoices: 3, showNoneItem: true, noneText: "Prefer not to answer",
              choices: [
                { value: "tf_alert", text: "Customer notification — tell nearby people you are open" },
                { value: "tf_billing", text: "Bill maker — make a receipt, calculate total automatically" },
                { value: "tf_product_id", text: "Product scan — use camera to find product name and price" },
                { value: "tf_credit_book", text: "Debt tracker — record who owes you, send reminders" },
                { value: "tf_promo", text: "Promotion message — send deals to nearby customers" },
                { value: "tf_summary", text: "Daily sales view — see how much you sold and earned today" },
                { value: "tf_storefront", text: "Online product page — show your products on the internet" }
              ]
            },
            { type: "comment", name: "feature_missing", title: "Any feature you wish you had?",
              isRequired: false, maxLength: 300 }

    /* ══════════════════════════════════════════════════════
       Utility Functions
       ══════════════════════════════════════════════════════ */
    function byId(id) { return document.getElementById(id); }

    function detectLang(paramLang) {
      if (paramLang && paramLang !== "auto") {
        const code = paramLang.split("-")[0].toLowerCase();
        if (code === "ne" || code === "np") return "ne";
        if (code === "hi") return "hi";
        if (code === "en") return "en";
        return code;
      }
      const langs = navigator.languages || [navigator.language || "en"];
      for (const l of langs) {
        const code = l.split("-")[0].toLowerCase();
        if (code === "ne" || code === "np") return "ne";
        if (code === "hi") return "hi";
      }
      return "ne";
    }

    function localizeSurvey(json, lang) {
      if (lang === "en" || !SURVEY_I18N[lang]) return json;
      const t = SURVEY_I18N[lang];
      const patched = JSON.parse(JSON.stringify(json));
      if (t.submit) patched.completeText = t.submit;
      for (const page of patched.pages) {
        if (t.pages[page.name]) page.title = t.pages[page.name];
        for (const el of page.elements || []) {
          if (el.type === "html") continue;
          if (t.questions[el.name]) el.title = t.questions[el.name];
          if (t.descriptions && t.descriptions[el.name]) el.description = t.descriptions[el.name];
          if (t.choices[el.name]) {
            el.choices = t.choices[el.name].map(c => ({ value: c.v, text: c.t }));
          }
          /* Translate noneText for checkboxes */
          if (el.showNoneItem && t.noneText) {
            el.noneText = t.noneText;
          }
          /* Translate contact intro HTML */
          if (el.name === "contact_intro") {
            const s = STRINGS[lang] || STRINGS.en;
            el.html = `<p style='font-size:0.9rem;color:#888;margin-bottom:8px;'>${s.contactIntro}</p>`;
          }
        }
      }
      return patched;
    }

    function applyChrome(lang) {
      const s = STRINGS[lang] || STRINGS.en;
      document.documentElement.lang = lang;
      byId("pageTitle").textContent = s.pageTitle;
      byId("pageSubtitle").textContent = s.pageSubtitle;
      byId("introText").textContent = s.introText;
      byId("langLabel").textContent = s.langLabel;
      byId("labelSession").textContent = s.labelSession;
      byId("labelArea").textContent = s.labelArea;
      byId("labelInterviewer").textContent = s.labelInterviewer;
      byId("langSelect").value = lang;
    }

    function updateProgress(survey, s) {
      const total = survey.visiblePageCount;
      const current = survey.currentPageNo;
      const remaining = total - current;
      const pct = Math.round((current / total) * 100);
      byId("progressStrip").classList.remove("hidden");
      const circumference = 2 * Math.PI * 18;
      byId("progressFill").style.strokeDashoffset = circumference - (circumference * pct / 100);
      byId("progressPct").textContent = pct + "%";
      byId("countdownText").textContent = s.countdown(remaining);
      const idx = Math.min(current, s.encourage.length - 1);
      const el = byId("encourageText");
      el.textContent = s.encourage[idx];
      el.style.animation = "none";
      el.offsetHeight;
      el.style.animation = "";
    }

    function parseConfig() {
      const params = new URLSearchParams(window.location.search);
      const fallback = {
        sid: params.get("sid") || "session-not-set",
        area: params.get("area") || "not-set",
        interviewer: params.get("iv") || "not-set",
        endpoint: params.get("ep") || "",
        lang: params.get("lang") || "auto"
      };
      const cfg = params.get("cfg");
      if (!cfg) return fallback;
      try {
        const b64 = cfg.replace(/-/g, "+").replace(/_/g, "/");
        const json = decodeURIComponent(escape(window.atob(b64)));
        const parsed = JSON.parse(json);
        return {
          sid: parsed.sid || fallback.sid,
          area: parsed.area || fallback.area,
          interviewer: parsed.iv || fallback.interviewer,
          endpoint: parsed.ep || fallback.endpoint,
          lang: parsed.lang || fallback.lang
        };
      } catch (error) {
        console.error("Invalid cfg in URL", error);
        return fallback;
      }
    }

    function midpointFromBand(type, value) {
      return (BAND_MIDPOINTS[type] || {})[value] || 0;
    }

    function computeEconomics(data) {
      return {
        customersPerShift: midpointFromBand("customers_band", data.customers_band),
        revenuePerShiftNpr: midpointFromBand("revenue_band", data.revenue_band)
      };
    }

    function randomId() {
      if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID().slice(0, 8).toUpperCase();
      return `R${Date.now().toString(36).toUpperCase()}`;
    }

    /* ── Geolocation + device info ── */
    let geoData = null;
    function captureGeolocation() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        pos => { geoData = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy }; },
        () => { geoData = { error: "denied_or_unavailable" }; },
        { enableHighAccuracy: false, timeout: 10000, maximumAge: 300000 }
      );
    }

    function getDeviceInfo() {
      const info = {
        userAgent: navigator.userAgent,
        platform: navigator.platform || "",
        screenWidth: screen.width,
        screenHeight: screen.height,
        viewportWidth: window.innerWidth,
        viewportHeight: window.innerHeight,
        touchSupport: "ontouchstart" in window || navigator.maxTouchPoints > 0,
        language: navigator.language || ""
      };
      if (navigator.connection) {
        info.connectionType = navigator.connection.effectiveType || "";
        info.downlink = navigator.connection.downlink || 0;
      }
      return info;
    }

    /* ── Help system ── */
    function setupHelpSystem(survey, lang) {
      const helpData = HELP_TEXT[lang] || HELP_TEXT.en;
      const overlay = byId("helpOverlay");
      const sheet = byId("helpSheet");
      const helpTitle = byId("helpTitle");
      const helpBody = byId("helpBody");

      function closeHelp() {
        sheet.classList.remove("open");
        overlay.classList.remove("open");
      }
      overlay.addEventListener("click", closeHelp);
      /* Swipe down to close */
      let touchStartY = 0;
      sheet.addEventListener("touchstart", e => { touchStartY = e.touches[0].clientY; }, { passive: true });
      sheet.addEventListener("touchmove", e => {
        if (e.touches[0].clientY - touchStartY > 60) closeHelp();
      }, { passive: true });

      survey.onAfterRenderQuestion.add((sender, options) => {
        const q = options.question;
        if (!helpData[q.name]) return;
        const titleEl = options.htmlElement.querySelector(".sd-question__title");
        if (!titleEl || titleEl.querySelector(".help-btn")) return;
        const btn = document.createElement("button");
        btn.className = "help-btn";
        btn.type = "button";
        btn.textContent = "?";
        btn.setAttribute("aria-label", "Help");
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const h = helpData[q.name];
          helpTitle.textContent = h.title;
          helpBody.innerHTML = h.body;
          sheet.classList.add("open");
          overlay.classList.add("open");
        });
        titleEl.appendChild(btn);
      });
    }

    /* ── Character counter for comment fields ── */
    function setupCharCounters(survey) {
      survey.onAfterRenderQuestion.add((sender, options) => {
        const q = options.question;
        if ((q.getType() === "comment" || q.getType() === "text") && q.maxLength) {
          const input = options.htmlElement.querySelector("textarea") || options.htmlElement.querySelector("input[type='text']");
          if (!input) return;
          if (input.parentElement.querySelector(".char-counter")) return;
          const counter = document.createElement("div");
          counter.className = "char-counter";
          const update = () => {
            const len = input.value ? input.value.length : 0;
            counter.textContent = `${len} / ${q.maxLength}`;
            counter.classList.toggle("near-limit", len > q.maxLength * 0.8);
          };
          update();
          input.addEventListener("input", update);
          input.parentElement.appendChild(counter);
        }
      });
    }

    /* ── Auto-advance on radio select ── */
    function setupAutoAdvance(survey) {
      survey.onValueChanged.add((sender, options) => {
        const q = sender.getQuestionByName(options.name);
        if (!q || q.getType() !== "radiogroup") return;
        const page = q.page;
        if (!page) return;
        const questions = page.questions;
        const idx = questions.indexOf(q);
        /* Find next visible question */
        for (let i = idx + 1; i < questions.length; i++) {
          if (questions[i].isVisible) {
            setTimeout(() => {
              const el = document.getElementById(questions[i].id);
              if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
            }, 150);
            return;
          }
        }
        /* If last question on page, don't auto-advance page — let user click Next */
      });
    }

    /* ── Celebration ── */
    function showCelebration() {
      const emojis = ["🎉", "🎊", "✨", "🌟", "💫", "🎈", "🥳", "⭐"];
      const container = document.createElement("div");
      container.className = "confetti-container";
      document.body.appendChild(container);
      for (let i = 0; i < 28; i++) {
        const piece = document.createElement("span");
        piece.className = "confetti-piece";
        piece.textContent = emojis[i % emojis.length];
        piece.style.left = (Math.random() * 100) + "%";
        piece.style.animationDelay = (Math.random() * 0.6) + "s";
        piece.style.animationDuration = (2 + Math.random() * 2) + "s";
        container.appendChild(piece);
      }
      setTimeout(() => container.remove(), 4500);
    }

    function showToast(text, duration) {
      duration = duration || 5000;
      const toast = document.createElement("div");
      toast.className = "success-toast";
      const close = document.createElement("button");
      close.className = "toast-close";
      close.textContent = "✕";
      close.addEventListener("click", () => toast.remove());
      const emoji = document.createElement("div");
      emoji.className = "toast-emoji";
      emoji.textContent = "🎉";
      const msg = document.createElement("div");
      msg.className = "toast-text";
      msg.textContent = text;
      toast.appendChild(close);
      toast.appendChild(emoji);
      toast.appendChild(msg);
      document.body.appendChild(toast);
      setTimeout(() => toast.classList.add("toast-fade"), duration - 500);
      setTimeout(() => { if (toast.parentElement) toast.remove(); }, duration);
    }

    /* ── Result card state ── */
    function setResultState(state, s, submissionId, errorMsg) {
      const card = byId("resultCard");
      card.classList.add("show");
      const title = byId("resultTitle");
      const msg = byId("resultMessage");
      const code = byId("submissionCode");
      const retry = byId("retryBtn");
      const copy = byId("copyPayloadBtn");
      const newBtn = byId("startOverBtn");

      title.classList.remove("submitting-pulse");
      code.classList.add("hidden");
      retry.classList.add("hidden");
      copy.classList.add("hidden");
      newBtn.classList.add("hidden");

      if (state === "submitting") {
        title.textContent = s.submitting;
        title.classList.add("submitting-pulse");
        msg.textContent = "";
      } else if (state === "success") {
        title.textContent = s.thankYou;
        msg.textContent = s.resultOk;
        code.textContent = "#" + submissionId;
        code.classList.remove("hidden");
        newBtn.textContent = s.newBtn;
        newBtn.classList.remove("hidden");
        showCelebration();
        showToast(s.celebrationText);
      } else if (state === "error") {
        title.textContent = s.resultFailed;
        msg.textContent = errorMsg || s.resultFailedDetail;
        code.textContent = "#" + submissionId;
        code.classList.remove("hidden");
        retry.textContent = s.retryBtn;
        retry.classList.remove("hidden");
        copy.textContent = s.copyBtn;
        copy.classList.remove("hidden");
        newBtn.textContent = s.newBtn;
        newBtn.classList.remove("hidden");
      }
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    /* ══════════════════════════════════════════════════════
       Bootstrap
       ══════════════════════════════════════════════════════ */
    function bootstrap() {
      registerLocales();
      captureGeolocation();
      const surveyStartedAt = new Date().toISOString();

      const config = parseConfig();
      const lang = detectLang(config.lang);
      config.lang = lang;
      const s = STRINGS[lang] || STRINGS.en;

      byId("metaSession").textContent = config.sid;
      byId("metaArea").textContent = config.area;
      byId("metaInterviewer").textContent = config.interviewer;
      applyChrome(lang);

      /* Set SurveyJS locale */
      Survey.surveyLocalization.currentLocale = lang;

      /* Language override */
      byId("langSelect").addEventListener("change", () => {
        const newLang = byId("langSelect").value;
        const url = new URL(window.location.href);
        const cfgParam = url.searchParams.get("cfg");
        if (cfgParam) {
          try {
            const b64 = cfgParam.replace(/-/g, "+").replace(/_/g, "/");
            const json = decodeURIComponent(escape(window.atob(b64)));
            const parsed = JSON.parse(json);
            parsed.lang = newLang;
            const newJson = JSON.stringify(parsed);
            const newB64 = btoa(unescape(encodeURIComponent(newJson)));
            url.searchParams.set("cfg", newB64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, ""));
          } catch (e) {
            url.searchParams.set("lang", newLang);
          }
        } else {
          url.searchParams.set("lang", newLang);
        }
        window.location.href = url.toString();
      });

      /* Render survey */
      const surveyJson = localizeSurvey(SURVEY_JSON, lang);
      const survey = new Survey.Model(surveyJson);
      survey.showCompletedPage = false;
      survey.locale = lang;

      /* Plugins — must register BEFORE render so initial page fires events */
      setupHelpSystem(survey, lang);
      setupCharCounters(survey);
      setupAutoAdvance(survey);

      survey.render(byId("surveyContainer"));

      updateProgress(survey, s);
      survey.onCurrentPageChanged.add(() => updateProgress(survey, s));

      /* Submit */
      let lastPayload = null;

      async function submitPayload(payload, endpoint) {
        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          if (!response.ok) return false;
          const data = await response.json();
          return data.ok === true;
        } catch {
          return false;
        }
      }

      survey.onComplete.add(async (sender) => {
        byId("surveyCard").classList.add("hidden");
        byId("progressStrip").classList.add("hidden");

        const submissionId = randomId();
        const economics = computeEconomics(sender.data);
        const payload = {
          submissionId,
          surveyVersion: SURVEY_VERSION,
          submittedAt: new Date().toISOString(),
          surveyStartedAt,
          surveyDurationMs: Date.now() - new Date(surveyStartedAt).getTime(),
          context: {
            sessionId: config.sid,
            area: config.area,
            interviewer: config.interviewer,
            lang: config.lang,
            pageUrl: window.location.href
          },
          device: getDeviceInfo(),
          geo: geoData,
          answers: sender.data,
          computed: economics
        };
        lastPayload = payload;

        const endpoint = config.endpoint || INTAKE_URL;

        if (!endpoint) {
          setResultState("error", s, submissionId, s.noEndpoint);
          return;
        }

        setResultState("submitting", s, submissionId);
        const ok = await submitPayload(payload, endpoint);
        setResultState(ok ? "success" : "error", s, submissionId);
      });

      byId("retryBtn").addEventListener("click", async () => {
        if (!lastPayload) return;
        const endpoint = config.endpoint || INTAKE_URL;
        if (!endpoint) return;
        setResultState("submitting", s, lastPayload.submissionId);
        const ok = await submitPayload(lastPayload, endpoint);
        setResultState(ok ? "success" : "error", s, lastPayload.submissionId);
      });

      byId("copyPayloadBtn").addEventListener("click", async () => {
        if (!lastPayload) return;
        try {
          await navigator.clipboard.writeText(JSON.stringify(lastPayload, null, 2));
          byId("resultMessage").textContent = s.copiedMsg;
        } catch {
          byId("resultMessage").textContent = s.noCopyMsg;
        }
      });

      byId("startOverBtn").addEventListener("click", () => window.location.reload());
    }

    bootstrap();
  </script>
</body>
